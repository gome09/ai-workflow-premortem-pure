name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

        **Note:** This is a local-preview project. Please confirm you are running on localhost or a trusted private network before reporting.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you running?
      placeholder: "e.g., v0.8.0-beta.1-local-preview-final"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - API (FastAPI backend)
        - Frontend (Streamlit Review Workbench)
        - Workflow Engine (LangGraph stages)
        - Safety / Eval / Evidence
        - Report Export
        - Docker / Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: Describe the unexpected behavior...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What was the expected behavior?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal set of steps to reproduce the issue.
      placeholder: |
        1. Start with `docker compose up -d`
        2. Create a session via POST /sessions/
        3. Send a message via POST /chat/{id}
        4. Observe the error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide relevant environment details.
      placeholder: |
        - OS: Windows 11 / macOS / Linux
        - Docker version: 24.x
        - Python version: 3.11
        - Browser (if frontend): Chrome 120
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output or error messages.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I am running this on localhost or a trusted private network
          required: true
        - label: I have checked that `.env` and real credentials are not committed
          required: true
