# docker-compose.yml
version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: aiwf_postgres
    environment:
      POSTGRES_DB: ai_workflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiwf_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiwf_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app        # 开发模式热重载

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiwf_frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      API_BASE: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
