# docker-compose.override.yml  ← dev mode (auto-merged with docker-compose.yml)
# Provides: HTTP (no TLS), hot-reload, exposed ports for direct access

services:

  api:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  frontend:
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    ports:
      - "8501:8501"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  nginx:
    # Dev: override nginx to serve HTTP only (no certs required)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/app.conf.dev:/etc/nginx/conf.d/app.conf:ro
    ports:
      - "80:80"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"
