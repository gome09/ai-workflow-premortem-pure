name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Lint
        run: make lint

      - name: Type check (non-blocking)
        run: make typecheck
        continue-on-error: true   # 观察一轮后转强制

      - name: Doc consistency check
        run: make doc-check

      - name: Dependency vulnerability audit (non-blocking)
        run: uv run pip-audit --strict
        continue-on-error: true   # 先告警不阻断，观察一轮后再评估升级

      - name: Unit tests with coverage (sqlite + mock)
        run: |
          cp -f .env.demo .env
          make test-cov

      - name: Coverage summary to job summary
        if: always()
        run: |
          uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY" || true

  docker-lite-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare env file
        run: cp -f .env.demo .env

      - name: Prepare data directory
        run: |
          mkdir -p data
          chmod 777 data

      - name: Build and start lite stack
        run: docker compose -f docker-compose.lite.yml up --build -d

      - name: Wait for api to become healthy
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:8000/health/live; do sleep 2; done'

      - name: Smoke test api
        run: |
          curl -sf http://localhost:8000/health/live
          curl -sf http://localhost:8000/health

      - name: Smoke test frontend
        run: |
          timeout 90 bash -c 'until curl -sf -o /dev/null http://localhost:8501; do sleep 2; done'

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.lite.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.lite.yml down -v

  # 完整生产栈集成（postgres/redis/api/frontend/nginx/prometheus/grafana）。
  # mock LLM + 随机生成 secrets + 自签 TLS，经 nginx HTTPS 反代验证真实存储链路。
  # 观察期 non-blocking（与 mypy 同策略）：远端稳定数轮后移除 continue-on-error 转强制。
  docker-full-integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare env file (postgres backend, mock LLM)
        run: |
          cp -f .env.example .env
          sed -i 's/^LLM_MODE=real/LLM_MODE=mock/' .env

      - name: Provision secrets and TLS certs
        run: |
          ./scripts/gen_secrets.sh
          ./scripts/gen_certs.sh
          # CI 专用：gen_secrets.sh 的 600 权限让容器内非 root 用户
          # （api appuser / grafana）读不到挂载的 /run/secrets/*。
          # 这些是一次性随机值，放宽为可读仅限 CI runner。
          chmod 644 secrets/*

      - name: Build and start full stack
        run: docker compose -f docker-compose.yml up --build -d

      - name: Wait for api via nginx HTTPS
        run: |
          timeout 240 bash -c 'until curl -ksf https://localhost/api/health/live; do sleep 3; done'

      - name: Smoke test api through nginx (real postgres + redis)
        run: |
          curl -ksf https://localhost/api/health/live
          curl -ksf https://localhost/api/health/ready
          curl -ksf https://localhost/api/health

      - name: Smoke test frontend through nginx
        run: |
          timeout 120 bash -c 'until curl -ksf -o /dev/null https://localhost/; do sleep 3; done'

      - name: Verify all 7 containers are running
        run: |
          docker compose -f docker-compose.yml ps
          running=$(docker compose -f docker-compose.yml ps --status running --format '{{.Service}}' | sort)
          expected=$(printf 'api\nfrontend\ngrafana\nnginx\npostgres\nprometheus\nredis\n')
          if [ "$running" != "$expected" ]; then
            echo "Expected 7 running services, got:"; echo "$running"; exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v
